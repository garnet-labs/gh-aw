name: Deploy Visual Editor to GitHub Pages

on:
  push:
    branches: [main, feature/visual-workflow-editor]
    paths:
      - 'docs/editor-app/**'

  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: docs/editor-app/package-lock.json

      - name: Install dependencies
        working-directory: docs/editor-app
        run: npm ci

      - name: Copy WASM loader files
        run: |
          mkdir -p docs/editor-app/public/wasm
          cp docs/public/wasm/* docs/editor-app/public/wasm/

      - name: Build for GitHub Pages
        working-directory: docs/editor-app
        run: npx vite build --mode ghpages

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/editor-app/dist

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
